<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>遛娃地图 - 发现周边遛娃好去处</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="map"></div>
<div id="loading-bar"></div>
<div id="toast"></div>

<div id="topbar">
  <div class="logo"><span class="icon">🧒</span>遛娃地图</div>
  <div class="spacer"></div>
  <div id="status-badge" class="busy">🔍 加载中</div>
  <div id="weather-card"><span class="temp">--°</span><span class="desc">加载中</span></div>
  <button class="btn-locate" id="btnLocate" title="重新定位">📍</button>
</div>

<div id="bottom-panel">
  <div id="category-bar">
    <div class="cat-chip active" data-cat="all"><span class="emoji">🗺️</span>全部</div>
    <div class="cat-chip" data-cat="park"><span class="emoji">🌳</span>公园绿地</div>
    <div class="cat-chip" data-cat="playground"><span class="emoji">🛝</span>游乐场</div>
    <div class="cat-chip" data-cat="museum"><span class="emoji">🏛️</span>博物馆</div>
    <div class="cat-chip" data-cat="mall"><span class="emoji">🛍️</span>商场空调</div>
    <div class="cat-chip" data-cat="library"><span class="emoji">📚</span>图书馆</div>
    <div class="cat-chip" data-cat="zoo"><span class="emoji">🐼</span>动物园</div>
    <div class="cat-sep"></div>
    <div class="cat-chip cat-emerg" data-cat="nursery"><span class="emoji">👶</span>母婴室</div>
    <div class="cat-chip cat-emerg" data-cat="hospital"><span class="emoji">🏥</span>医院</div>
    <div class="cat-chip cat-emerg" data-cat="babyShop"><span class="emoji">🍼</span>母婴用品</div>
  </div>
</div>

<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-handle"></div>
  <div id="drawer-header">
    <h3 id="drawer-title">附近遛娃好去处</h3>
    <span id="drawer-count">0个</span>
  </div>
  <div id="drawer-list"></div>
  <div id="drawer-empty">
    <div class="big-emoji">🔍</div>
    <p id="drawer-empty-msg">正在加载周边地点...</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
